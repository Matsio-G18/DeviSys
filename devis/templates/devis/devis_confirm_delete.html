{% extends "core/base.html" %}

{% block title %}Suppression du devis{% endblock %}

{% block content %}
<h1>Supprimer le devis {{ devis.numero }}</h1>
<p>Confirmez-vous la suppression de ce devis ? Cette action est irréversible.</p>
<form method="post">
  {% csrf_token %}
  <button type="submit" class="btn" style="background:#ff5c5c">Supprimer</button>
  <a class="btn" href="{% url 'devis:detail' devis.pk %}" style="margin-left:8px">Annuler</a>
</form>
{% endblock %}
